<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="Classic Snake game - Retro arcade experience">
  <title>Snake - Retro Arcade</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0a0f;
      --bg-dark: #12121a;
      --neon-cyan: #00ffff;
      --neon-magenta: #ff00ff;
      --neon-green: #00ff88;
      --neon-yellow: #ffff00;
      --neon-red: #ff3366;
      --grid-color: #1a1a2e;
      --text-dim: #4a4a6a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Orbitron', sans-serif;
      background: var(--bg-deep);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.15) 2px,
          rgba(0, 0, 0, 0.15) 4px
        );
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, var(--bg-deep) 70%);
      pointer-events: none;
      z-index: 99;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    .header {
      text-align: center;
    }

    .title {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(24px, 6vw, 40px);
      color: var(--neon-cyan);
      text-shadow: 
        0 0 10px var(--neon-cyan),
        0 0 20px var(--neon-cyan),
        0 0 40px var(--neon-cyan);
      letter-spacing: 4px;
      animation: flicker 3s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.8; }
      94% { opacity: 1; }
      96% { opacity: 0.9; }
      97% { opacity: 1; }
    }

    .score-display {
      display: flex;
      gap: 40px;
      margin-top: 15px;
    }

    .score-box {
      text-align: center;
    }

    .score-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .score-value {
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 700;
      color: var(--neon-green);
      text-shadow: 0 0 10px var(--neon-green);
    }

    .score-box.high-score .score-value {
      color: var(--neon-magenta);
      text-shadow: 0 0 10px var(--neon-magenta);
    }

    .game-wrapper {
      position: relative;
      padding: 4px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
      border-radius: 8px;
      animation: borderGlow 2s linear infinite;
    }

    @keyframes borderGlow {
      0% { box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0,255,255,0.3); }
      50% { box-shadow: 0 0 20px var(--neon-magenta), 0 0 40px rgba(255,0,255,0.3); }
      100% { box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0,255,255,0.3); }
    }

    .game-container {
      background: var(--bg-dark);
      border-radius: 4px;
      position: relative;
    }

    canvas {
      display: block;
      border-radius: 4px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.95);
      border-radius: 4px;
      gap: 20px;
      transition: opacity 0.3s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-title {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(16px, 4vw, 24px);
      color: var(--neon-yellow);
      text-shadow: 0 0 15px var(--neon-yellow);
      text-align: center;
      line-height: 1.6;
    }

    .overlay-subtitle {
      font-size: 14px;
      color: var(--text-dim);
      text-align: center;
    }

    .btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 15px 30px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      color: var(--bg-deep);
      box-shadow: 
        0 0 20px rgba(0, 255, 136, 0.5),
        inset 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 
        0 0 30px rgba(0, 255, 136, 0.8),
        inset 0 0 20px rgba(255, 255, 255, 0.3);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .controls-hint {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
    }

    .game-over-score {
      font-size: 32px;
      color: var(--neon-cyan);
      text-shadow: 0 0 20px var(--neon-cyan);
      margin: 10px 0;
    }

    .touch-controls {
      display: none;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(3, 60px);
      gap: 5px;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      .touch-controls {
        display: grid;
      }
    }

    .touch-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .touch-btn:active {
      background: rgba(0, 255, 255, 0.2);
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }

    .touch-btn.up { grid-column: 2; grid-row: 1; }
    .touch-btn.left { grid-column: 1; grid-row: 2; }
    .touch-btn.down { grid-column: 2; grid-row: 3; }
    .touch-btn.right { grid-column: 3; grid-row: 2; }

    .install-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-dark);
      border: 1px solid var(--neon-cyan);
      padding: 15px 25px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
      z-index: 200;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .install-prompt.hidden {
      display: none;
    }

    .install-prompt span {
      color: var(--neon-cyan);
      font-size: 13px;
    }

    .install-btn {
      background: var(--neon-cyan);
      color: var(--bg-deep);
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
    }

    .close-prompt {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">SNAKE</h1>
      <div class="score-display">
        <div class="score-box">
          <div class="score-label">Score</div>
          <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box high-score">
          <div class="score-label">Best</div>
          <div class="score-value" id="highScore">0</div>
        </div>
      </div>
    </div>

    <div class="game-wrapper">
      <div class="game-container">
        <canvas id="game" width="400" height="400"></canvas>
        
        <div class="overlay" id="menuOverlay">
          <div class="overlay-title">SNAKE</div>
          <div class="overlay-subtitle">Retro Arcade Edition</div>
          <button class="btn btn-primary" id="startBtn">START GAME</button>
          <div class="controls-hint">Use Arrow Keys or WASD to control<br>Mobile: Use on-screen buttons</div>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
          <div class="overlay-title">GAME OVER</div>
          <div class="game-over-score" id="finalScore">0</div>
          <div class="overlay-subtitle">Points</div>
          <button class="btn btn-primary" id="restartBtn">PLAY AGAIN</button>
        </div>
      </div>
    </div>

    <div class="touch-controls">
      <button class="touch-btn up" data-dir="up">▲</button>
      <button class="touch-btn left" data-dir="left">◀</button>
      <button class="touch-btn down" data-dir="down">▼</button>
      <button class="touch-btn right" data-dir="right">▶</button>
    </div>
  </div>

  <div class="install-prompt hidden" id="installPrompt">
    <span>Install Snake Game</span>
    <button class="install-btn" id="installBtn">Install</button>
    <button class="close-prompt" id="closePrompt">×</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const menuOverlay = document.getElementById('menuOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const touchControls = document.querySelectorAll('.touch-btn');
    const installPrompt = document.getElementById('installPrompt');
    const installBtn = document.getElementById('installBtn');
    const closePrompt = document.getElementById('closePrompt');

    const GRID_SIZE = 20;
    const CELL_COUNT = canvas.width / GRID_SIZE;
    const COLORS = {
      snake: '#00ff88',
      snakeHead: '#00ffcc',
      food: '#ff3366',
      foodGlow: '#ff6699',
      grid: '#1a1a2e'
    };

    let snake = [];
    let food = { x: 0, y: 0 };
    let direction = { x: 0, y: 0 };
    let nextDirection = { x: 0, y: 0 };
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
    let gameLoop = null;
    let isPlaying = false;
    let gameSpeed = 120;

    highScoreEl.textContent = highScore;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameSpeed = 120;
      scoreEl.textContent = score;
      spawnFood();
    }

    function spawnFood() {
      let valid = false;
      while (!valid) {
        food.x = Math.floor(Math.random() * CELL_COUNT);
        food.y = Math.floor(Math.random() * CELL_COUNT);
        valid = !snake.some(segment => segment.x === food.x && segment.y === food.y);
      }
    }

    function draw() {
      ctx.fillStyle = '#12121a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < CELL_COUNT; i++) {
        for (let j = 0; j < CELL_COUNT; j++) {
          ctx.fillStyle = (i + j) % 2 === 0 ? '#15151f' : '#12121a';
          ctx.fillRect(i * GRID_SIZE, j * GRID_SIZE, GRID_SIZE, GRID_SIZE);
        }
      }

      ctx.shadowColor = COLORS.food;
      ctx.shadowBlur = 20;
      ctx.fillStyle = COLORS.food;
      ctx.beginPath();
      ctx.arc(
        food.x * GRID_SIZE + GRID_SIZE / 2,
        food.y * GRID_SIZE + GRID_SIZE / 2,
        GRID_SIZE / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = COLORS.foodGlow;
      ctx.beginPath();
      ctx.arc(
        food.x * GRID_SIZE + GRID_SIZE / 2,
        food.y * GRID_SIZE + GRID_SIZE / 2,
        GRID_SIZE / 2 + 5,
        0,
        Math.PI * 2
      );
      ctx.fill();

      snake.forEach((segment, index) => {
        const isHead = index === 0;
        const color = isHead ? COLORS.snakeHead : COLORS.snake;
        
        ctx.shadowColor = color;
        ctx.shadowBlur = isHead ? 15 : 10;
        
        ctx.fillStyle = color;
        const padding = 1;
        ctx.fillRect(
          segment.x * GRID_SIZE + padding,
          segment.y * GRID_SIZE + padding,
          GRID_SIZE - padding * 2,
          GRID_SIZE - padding * 2
        );

        if (isHead) {
          ctx.fillStyle = '#0a0a0f';
          const eyeSize = 3;
          const eyeOffset = 5;
          
          if (direction.x === 1) {
            ctx.fillRect(segment.x * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, segment.y * GRID_SIZE + 5, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, segment.y * GRID_SIZE + GRID_SIZE - 5 - eyeSize, eyeSize, eyeSize);
          } else if (direction.x === -1) {
            ctx.fillRect(segment.x * GRID_SIZE + eyeOffset, segment.y * GRID_SIZE + 5, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + eyeOffset, segment.y * GRID_SIZE + GRID_SIZE - 5 - eyeSize, eyeSize, eyeSize);
          } else if (direction.y === 1) {
            ctx.fillRect(segment.x * GRID_SIZE + 5, segment.y * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + GRID_SIZE - 5 - eyeSize, segment.y * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
          } else if (direction.y === -1) {
            ctx.fillRect(segment.x * GRID_SIZE + 5, segment.y * GRID_SIZE + eyeOffset, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + GRID_SIZE - 5 - eyeSize, segment.y * GRID_SIZE + eyeOffset, eyeSize, eyeSize);
          }
        }
      });
      ctx.shadowBlur = 0;
    }

    function update() {
      direction = { ...nextDirection };
      
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      if (head.x < 0 || head.x >= CELL_COUNT || head.y < 0 || head.y >= CELL_COUNT) {
        gameOver();
        return;
      }

      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        
        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
          localStorage.setItem('snakeHighScore', highScore);
        }

        if (score % 50 === 0 && gameSpeed > 50) {
          gameSpeed -= 5;
          clearInterval(gameLoop);
          gameLoop = setInterval(update, gameSpeed);
        }

        spawnFood();
      } else {
        snake.pop();
      }
    }

    function gameOver() {
      isPlaying = false;
      clearInterval(gameLoop);
      finalScoreEl.textContent = score;
      gameOverOverlay.classList.remove('hidden');
    }

    function startGame() {
      initGame();
      isPlaying = true;
      menuOverlay.classList.add('hidden');
      gameOverOverlay.classList.add('hidden');
      gameLoop = setInterval(() => {
        update();
        draw();
      }, gameSpeed);
    }

    function handleKeydown(e) {
      if (!isPlaying) {
        if (e.key === 'Enter' || e.key === ' ') {
          startGame();
        }
        return;
      }

      switch (e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
          if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
          break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
          if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
          break;
      }
    }

    document.addEventListener('keydown', handleKeydown);

    touchControls.forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!isPlaying) return;
        
        const dir = btn.dataset.dir;
        if (dir === 'up' && direction.y !== 1) nextDirection = { x: 0, y: -1 };
        if (dir === 'down' && direction.y !== -1) nextDirection = { x: 0, y: 1 };
        if (dir === 'left' && direction.x !== 1) nextDirection = { x: -1, y: 0 };
        if (dir === 'right' && direction.x !== -1) nextDirection = { x: 1, y: 0 };
      });
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!localStorage.getItem('snakeInstalled')) {
        installPrompt.classList.remove('hidden');
      }
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          localStorage.setItem('snakeInstalled', 'true');
        }
        deferredPrompt = null;
        installPrompt.classList.add('hidden');
      }
    });

    closePrompt.addEventListener('click', () => {
      installPrompt.classList.add('hidden');
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.log('Service Worker registration failed:', err));
    }

    draw();
  </script>
</body>
</html>
